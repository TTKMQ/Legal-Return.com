<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>LegalReturn — Проверка безопасности</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f0f4ff;
  --bg2:     #f8faff;
  --white:   #ffffff;
  --text:    #0a0e1a;
  --text2:   #5a6278;
  --text3:   #8890a6;
  --accent:  #0057d9;
  --accent2: #0064f0;
  --green:   #059669;
  --red:     #dc2626;
  --border:  rgba(0,60,180,0.09);
  --border2: rgba(0,60,180,0.16);
  --card:    rgba(255,255,255,0.88);
  --nav-bg:  rgba(248,250,255,0.90);
  --orb1:    rgba(0,87,217,0.13);
  --orb2:    rgba(90,200,250,0.10);
  --orb3:    rgba(124,58,237,0.08);
  --shadow2: 0 28px 80px rgba(0,60,180,0.16);
  --inp-bg:  #ffffff;
  --inp-border: rgba(0,60,180,0.18);
  color-scheme: light;
  transition: background .35s, color .35s;
}
[data-theme="dark"] {
  --bg:      #080c18;
  --bg2:     #0d1120;
  --white:   #131929;
  --text:    #e8eeff;
  --text2:   #8892b0;
  --text3:   #526080;
  --accent:  #4d9eff;
  --accent2: #5faaff;
  --green:   #34d399;
  --red:     #f87171;
  --border:  rgba(100,160,255,0.12);
  --border2: rgba(100,160,255,0.22);
  --card:    rgba(20,28,50,0.92);
  --nav-bg:  rgba(8,12,24,0.94);
  --orb1:    rgba(77,158,255,0.15);
  --orb2:    rgba(90,200,250,0.10);
  --orb3:    rgba(167,139,250,0.10);
  --shadow2: 0 28px 80px rgba(0,0,0,0.65);
  --inp-bg:  rgba(255,255,255,0.05);
  --inp-border: rgba(100,160,255,0.22);
  color-scheme: dark;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;scroll-behavior:smooth;}
body{
  background:var(--bg2);color:var(--text);
  font-family:'Manrope',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .35s,color .35s;
  overflow-x:hidden;min-height:100vh;
  display:flex;flex-direction:column;
}
.orb-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(110px);pointer-events:none;animation:orbFade 2s forwards;opacity:0;transition:background .5s;}
@keyframes orbFade{to{opacity:1;}}
.orb1{width:680px;height:680px;background:var(--orb1);top:-160px;left:-180px;animation-delay:.3s;}
.orb2{width:480px;height:480px;background:var(--orb2);bottom:-80px;right:-60px;animation-delay:.6s;}
.orb3{width:340px;height:340px;background:var(--orb3);top:55%;left:52%;transform:translate(-50%,-50%);animation-delay:.9s;}
#particles-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55;}

/* NAV */
nav{
  position:sticky;top:0;left:0;right:0;z-index:1000;
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 44px;
  background:var(--nav-bg);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  transition:background .4s,border-color .4s;
}
.nav-logo{font-size:16px;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:-.3px;}
.nav-logo span{color:var(--accent);}
.theme-btn{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);
  background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .3s,transform .3s;position:relative;overflow:hidden;flex-shrink:0;
}
.theme-btn:hover{transform:scale(1.08);background:var(--bg);}
.theme-btn svg{position:absolute;transition:opacity .3s,transform .4s cubic-bezier(.22,1,.36,1);color:var(--text2);}
.theme-btn .sun{opacity:1;transform:rotate(0deg) scale(1);}
.theme-btn .moon{opacity:0;transform:rotate(-90deg) scale(.5);}
[data-theme="dark"] .theme-btn .sun{opacity:0;transform:rotate(90deg) scale(.5);}
[data-theme="dark"] .theme-btn .moon{opacity:1;transform:rotate(0deg) scale(1);}

main{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}

/* CARD */
.captcha-card{
  background:var(--card);border:1px solid var(--border2);border-radius:24px;
  box-shadow:var(--shadow2);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  padding:52px 48px 44px;max-width:460px;width:100%;text-align:center;
  opacity:0;animation:cardIn .85s .15s cubic-bezier(.22,1,.36,1) forwards;
  position:relative;overflow:hidden;
}
.captcha-card::before{
  content:'';position:absolute;top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.35;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(22px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.shield-wrap{
  display:inline-flex;align-items:center;justify-content:center;
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,rgba(0,87,217,.13),rgba(90,200,250,.07));
  border:1px solid var(--border2);margin-bottom:24px;position:relative;
}
.shield-wrap::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1px solid rgba(0,87,217,.14);animation:ping 2.6s ease-out infinite;
}
@keyframes ping{0%{transform:scale(1);opacity:.5;}100%{transform:scale(1.5);opacity:0;}}
.shield-wrap svg{color:var(--accent);}
.card-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:600;color:var(--accent);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;
}
.tag-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 2s 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.65);}}
.card-title{font-size:clamp(20px,4vw,28px);font-weight:800;letter-spacing:-.55px;line-height:1.18;color:var(--text);margin-bottom:10px;}
.card-title .blue{color:var(--accent);}
.card-desc{font-size:13.5px;font-weight:400;line-height:1.65;color:var(--text2);margin-bottom:28px;}

/* ATTEMPTS */
.attempts-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--text3);
  border:1px solid var(--border2);border-radius:980px;padding:4px 12px;margin-bottom:20px;
}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);transition:background .3s;}
.dot.warn{background:#f59e0b;}
.dot.danger{background:var(--red);}

/* CAPTCHA BOX */
.captcha-box{
  background:var(--inp-bg);border:1px solid var(--inp-border);
  border-radius:14px;padding:18px;margin-bottom:16px;
  transition:border-color .3s;
}
.captcha-box:focus-within{border-color:var(--accent);}
.canvas-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
#captchaCanvas{
  flex:1;border-radius:9px;display:block;border:1px solid var(--border2);
  background:transparent;max-width:100%;height:72px;
}
.refresh-btn{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--border2);background:var(--white);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .25s,transform .4s cubic-bezier(.22,1,.36,1);color:var(--text2);
}
.refresh-btn:hover{background:var(--bg);color:var(--accent);}
.refresh-btn.spin svg{transform:rotate(360deg);transition:transform .38s cubic-bezier(.22,1,.36,1);}
.captcha-input{
  width:100%;padding:13px 16px;
  background:var(--inp-bg);border:1px solid var(--inp-border);border-radius:10px;
  font-family:'Manrope',sans-serif;font-size:15px;font-weight:600;letter-spacing:.18em;
  color:var(--text);outline:none;transition:border-color .25s,box-shadow .25s;text-align:center;
}
.captcha-input::placeholder{font-weight:400;letter-spacing:normal;color:var(--text3);font-size:13px;}
.captcha-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,87,217,.10);}
.captcha-input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.08);animation:shake .42s;}
.captcha-input.ok{border-color:var(--green);box-shadow:0 0 0 3px rgba(5,150,105,.10);}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.captcha-hint{font-size:11px;color:var(--text3);margin-top:7px;}

/* SUBMIT */
.submit-btn{
  width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:12px;font-family:'Manrope',sans-serif;
  font-size:14.5px;font-weight:700;cursor:pointer;
  transition:background .25s,transform .2s,box-shadow .25s;
  box-shadow:0 4px 20px rgba(0,87,217,.22);margin-bottom:4px;
}
.submit-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,87,217,.30);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.status-line{min-height:20px;font-size:13px;font-weight:500;text-align:center;margin-top:10px;transition:color .3s;color:var(--text3);}
.status-line.ok{color:var(--green);}
.status-line.err{color:var(--red);}

/* TRUST */
.trust-row{
  display:flex;align-items:center;justify-content:center;gap:18px;
  margin-top:28px;padding-top:22px;border-top:1px solid var(--border);flex-wrap:wrap;
}
.trust-item{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text3);font-weight:500;}
.trust-item svg{color:var(--accent);flex-shrink:0;}

footer{position:relative;z-index:1;text-align:center;padding:16px 24px 24px;font-size:12px;color:var(--text3);}
footer a{color:var(--text3);text-decoration:none;transition:color .2s;}
footer a:hover{color:var(--accent);}

@media(max-width:520px){
  nav{padding:0 18px;}
  .captcha-card{padding:36px 20px 32px;}
}
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="orb-wrap">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a class="nav-logo" href="#">Legal<span>Return</span></a>
  <button class="theme-btn" id="themeBtn" aria-label="Тема">
    <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</nav>

<main>
  <div class="captcha-card">
    <div class="shield-wrap">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>

    <div class="card-tag"><span class="tag-dot"></span>Проверка безопасности</div>
    <h1 class="card-title">Введите <span class="blue">код</span><br>с картинки</h1>
    <p class="card-desc">Это защищает сайт от автоматических атак и ботов.</p>

    <div class="attempts-badge">
      <span class="dot" id="attemptDot"></span>
      <span id="attemptText">Попыток осталось: 5</span>
    </div>

    <div class="captcha-box">
      <div class="canvas-row">
        <canvas id="captchaCanvas" width="260" height="72"></canvas>
        <button class="refresh-btn" id="refreshBtn" title="Новый код" aria-label="Обновить капчу">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <input class="captcha-input" id="captchaInput"
        type="text" maxlength="6" autocomplete="off" autocorrect="off"
        spellcheck="false" placeholder="Введите 6 символов с картинки">
      <div class="captcha-hint">Без учёта регистра · буквы и цифры</div>
    </div>

    <button class="submit-btn" id="submitBtn">Подтвердить →</button>
    <div class="status-line" id="statusLine"></div>

    <div class="trust-row">
      <span class="trust-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Данные защищены
      </span>
      <span class="trust-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Защита от DDoS
      </span>
      <span class="trust-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ~10 секунд
      </span>
    </div>
  </div>
</main>

<footer>
  © 2025 LegalReturn ·
  <a href="#">Политика конфиденциальности</a> ·
  <a href="#">Условия использования</a>
</footer>

<script>
/* ── Theme ─────────────────────────────────────────────────── */
(function(){
  const html = document.documentElement;
  const btn  = document.getElementById('themeBtn');
  const saved = localStorage.getItem('lr-theme');
  if(saved) html.setAttribute('data-theme', saved);
  btn.addEventListener('click', function(){
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('lr-theme', next);
    if(window._redrawCaptcha) window._redrawCaptcha();
  });
})();

/* ── CAPTCHA ENGINE ─────────────────────────────────────────── */
(function(){
  /* ↓ Change to your main page filename */
  const MAIN_PAGE = 'legalreturn_FINAL.html';
  const MAX_TRIES = 5;
  const LOCK_SECS = 30;
  const CHARS     = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

  let code   = '';
  let tries  = MAX_TRIES;
  let locked = false;
  let lockTimerId = null;

  const canvas      = document.getElementById('captchaCanvas');
  const ctx         = canvas.getContext('2d');
  const input       = document.getElementById('captchaInput');
  const submitBtn   = document.getElementById('submitBtn');
  const refreshBtn  = document.getElementById('refreshBtn');
  const statusLine  = document.getElementById('statusLine');
  const attemptDot  = document.getElementById('attemptDot');
  const attemptText = document.getElementById('attemptText');

  const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';
  const rndInt  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
  const rndF    = (a,b) => Math.random()*(b-a)+a;

  /* ── Generate 6-char code ─── */
  function genCode(){
    let s='';
    for(let i=0;i<6;i++) s+=CHARS[rndInt(0,CHARS.length-1)];
    return s;
  }

  /* ── Draw captcha ──────────────────────────────────────────── */
  function draw(){
    const W = canvas.width  = canvas.parentElement.clientWidth - 48 || 260;
    const H = canvas.height = 72;
    const dark = isDark();

    /* Background */
    const grad = ctx.createLinearGradient(0,0,W,H);
    if(dark){
      grad.addColorStop(0,'#0b1020');
      grad.addColorStop(1,'#111828');
    } else {
      grad.addColorStop(0,'#eef3ff');
      grad.addColorStop(1,'#e8f0ff');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    /* Grid lines */
    ctx.strokeStyle = dark ? 'rgba(80,130,230,0.07)' : 'rgba(0,60,200,0.05)';
    ctx.lineWidth = 1;
    for(let x=0;x<W;x+=18){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0;y<H;y+=18){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    /* Noise dots */
    for(let i=0;i<60;i++){
      const alpha = rndF(.06,.2);
      ctx.beginPath();
      ctx.arc(rndF(0,W), rndF(0,H), rndF(.4,1.5), 0, Math.PI*2);
      ctx.fillStyle = dark ? `rgba(100,160,255,${alpha})` : `rgba(0,80,200,${alpha})`;
      ctx.fill();
    }

    /* Bezier noise lines */
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(rndF(0,W*.25), rndF(0,H));
      ctx.bezierCurveTo(
        rndF(W*.15,W*.45), rndF(0,H),
        rndF(W*.55,W*.85), rndF(0,H),
        rndF(W*.75,W),     rndF(0,H)
      );
      const alpha = rndF(.09,.2);
      ctx.strokeStyle = dark
        ? `rgba(${rndInt(60,130)},${rndInt(130,200)},255,${alpha})`
        : `rgba(0,${rndInt(60,130)},${rndInt(180,240)},${alpha})`;
      ctx.lineWidth = rndF(.7,1.5);
      ctx.stroke();
    }

    /* Letters */
    const letterW = W / 6;
    const fontFamilies = [
      "'Georgia',serif",
      "'Courier New',monospace",
      "'Arial Black',sans-serif",
      "Impact,sans-serif",
      "'Times New Roman',serif",
      "'Courier New',monospace"
    ];
    const fontStyles = ['bold italic','bold','900','italic bold','800 italic','bold'];
    const baseSize = Math.min(H * .54, 34);
    const hues = [211,198,220,205,215,202];

    for(let i=0;i<code.length;i++){
      ctx.save();
      const cx = letterW*i + letterW*.5 + rndF(-2,2);
      const cy = H*.5 + rndF(-5,5);
      ctx.translate(cx, cy);
      ctx.rotate(rndF(-0.30, 0.30));

      const sz = baseSize + rndF(-4,5);
      ctx.font = `${fontStyles[i]} ${sz}px ${fontFamilies[i]}`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      /* Glow pass */
      ctx.shadowColor = dark ? 'rgba(80,160,255,0.55)' : 'rgba(0,80,210,0.28)';
      ctx.shadowBlur  = 8;

      const sat   = dark ? '100%' : '85%';
      const light = dark ? rndInt(58,76) : rndInt(26,46);
      ctx.fillStyle = `hsla(${hues[i]},${sat},${light}%,${rndF(.85,1)})`;
      ctx.fillText(code[i], 0, 0);

      /* Solid pass (no shadow) */
      ctx.shadowBlur = 0;
      ctx.fillText(code[i], 0, 0);

      ctx.restore();
    }

    /* Watermark */
    ctx.font = '9px monospace';
    ctx.fillStyle = dark ? 'rgba(100,150,255,0.15)' : 'rgba(0,80,180,0.10)';
    ctx.fillText('LR-SEC', W-32, 9);
  }

  window._redrawCaptcha = draw;

  /* ── New captcha ─── */
  function newCaptcha(){
    code = genCode();
    input.value = '';
    input.classList.remove('error','ok');
    statusLine.textContent = '';
    statusLine.className = 'status-line';
    draw();
  }

  /* ── Badge ─── */
  function updateBadge(){
    attemptText.textContent = `Попыток осталось: ${tries}`;
    attemptDot.className = 'dot';
    if(tries<=1) attemptDot.classList.add('danger');
    else if(tries<=3) attemptDot.classList.add('warn');
  }

  /* ── Lock ─── */
  function lockOut(){
    locked = true;
    submitBtn.disabled = true;
    input.disabled = true;
    let secs = LOCK_SECS;
    function tick(){
      statusLine.textContent = `⛔ Слишком много попыток. Подождите ${secs} с…`;
      statusLine.className = 'status-line err';
      if(secs-- > 0){ lockTimerId = setTimeout(tick,1000); }
      else {
        locked=false; tries=MAX_TRIES;
        submitBtn.disabled=false; input.disabled=false;
        input.classList.remove('error');
        updateBadge(); newCaptcha();
        statusLine.textContent='';
        statusLine.className='status-line';
      }
    }
    tick();
  }

  /* ── Rate limiter ─── */
  let hitTimes = [];
  function isRateLimited(){
    const now=Date.now();
    hitTimes = hitTimes.filter(t=>now-t<60000);
    if(hitTimes.length>=18) return true;
    hitTimes.push(now);
    return false;
  }

  /* ── Verify ─── */
  function verify(){
    if(locked) return;
    if(isRateLimited()){ lockOut(); return; }

    const val = input.value.trim().toUpperCase();
    if(val.length < 6){
      statusLine.textContent = 'Введите все 6 символов.';
      statusLine.className = 'status-line err';
      input.classList.add('error');
      setTimeout(()=>input.classList.remove('error'), 550);
      return;
    }

    if(val === code){
      input.classList.add('ok');
      submitBtn.disabled = true;
      statusLine.textContent = '✓ Проверка пройдена — перенаправляем…';
      statusLine.className = 'status-line ok';
      setTimeout(()=>{ window.location.href = MAIN_PAGE; }, 950);
    } else {
      tries--;
      updateBadge();
      input.classList.add('error');
      setTimeout(()=>{ input.classList.remove('error'); input.value=''; }, 550);
      if(tries<=0){ lockOut(); }
      else {
        statusLine.textContent = tries===1
          ? '❌ Неверно. Последняя попытка!'
          : '❌ Неверно. Попробуйте ещё раз.';
        statusLine.className = 'status-line err';
        newCaptcha();
      }
    }
  }

  /* ── Events ─── */
  refreshBtn.addEventListener('click', function(){
    if(locked) return;
    const svg = this.querySelector('svg');
    svg.style.transform = 'rotate(360deg)';
    svg.style.transition = 'transform .38s cubic-bezier(.22,1,.36,1)';
    setTimeout(()=>{ svg.style.transform=''; svg.style.transition=''; }, 400);
    newCaptcha();
  });

  submitBtn.addEventListener('click', verify);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') verify(); });
  input.addEventListener('input', function(){
    input.classList.remove('error');
    if(this.value.length===6) setTimeout(verify, 200);
  });

  window.addEventListener('resize', draw, {passive:true});

  updateBadge();
  newCaptcha();
})();

/* ── Particles ─────────────────────────────────────────────── */
(function(){
  const cv  = document.getElementById('particles-canvas');
  const ctx = cv.getContext('2d');
  let W,H,pts=[];
  const N   = 50;
  const dark= ()=>document.documentElement.getAttribute('data-theme')==='dark';

  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }

  class P{
    constructor(){ this.reset(); this.y=Math.random()*(H||600); }
    reset(){
      this.x=(Math.random())*(W||800); this.y=(Math.random())*(H||600);
      this.r=Math.random()*1.3+.3;
      this.vx=(Math.random()-.5)*.16; this.vy=(Math.random()-.5)*.16;
      this.a=Math.random()*.5+.1; this.da=(Math.random()-.5)*.003;
      const r=Math.random();
      this.hue=r<.65?(dark()?'210,100%,70%':'211,100%,42%'):r<.88?'198,100%,58%':'270,60%,65%';
    }
  }

  function frame(){
    ctx.clearRect(0,0,W,H);
    const mx=130;
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<mx){
        const al=(1-d/mx)*(dark()?.11:.055);
        ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=dark()?`rgba(100,170,255,${al})`:`rgba(0,100,200,${al})`;
        ctx.lineWidth=.5; ctx.stroke();
      }
    }
    for(const p of pts){
      p.x+=p.vx; p.y+=p.vy; p.a+=p.da;
      if(p.a>.62)p.da=-Math.abs(p.da); if(p.a<.07)p.da=Math.abs(p.da);
      if(p.x<-8)p.x=W+8; if(p.x>W+8)p.x=-8;
      if(p.y<-8)p.y=H+8; if(p.y>H+8)p.y=-8;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},${p.a})`; ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  new MutationObserver(()=>pts.forEach(p=>p.reset()))
    .observe(document.documentElement,{attributes:true});
  window.addEventListener('resize',resize,{passive:true});
  resize();
  pts=Array.from({length:N},()=>new P());
  frame();
})();
</script>
